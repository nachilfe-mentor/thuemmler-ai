        tailwind.config = {

    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.7); }

        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-strong {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.4s ease-out forwards;
            opacity: 0;
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 2s linear infinite; }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 0 20px 4px rgba(99, 102, 241, 0.2); }
        }

        .sidebar-link {
            transition: all 0.2s ease;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
        }
        .sidebar-link.active {
            border-right: 3px solid #6366f1;
        }

        .score-circle {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .score-circle svg {
            transform: rotate(-90deg);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(100, 116, 139, 0.3);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .severity-critical { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .severity-high { background: rgba(249, 115, 22, 0.15); color: #fdba74; border: 1px solid rgba(249, 115, 22, 0.3); }
        .severity-medium { background: rgba(245, 158, 11, 0.15); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }
        .severity-low { background: rgba(34, 197, 94, 0.15); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.3); }
        .severity-info { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.3); }

        .badge-new { background: rgba(34, 197, 94, 0.15); color: #86efac; }
        .badge-solved { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; }
        .badge-worse { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }

        .table-row {
            transition: background 0.15s;
        }
        .table-row:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        /* Mobile sidebar overlay */
        #sidebar-overlay {
            transition: opacity 0.3s;
        }
        #sidebar {
            transition: transform 0.3s ease;
        }

        /* Confirmation modal */
        .modal-overlay {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
        }

        /* Radar chart */
        .radar-label {
            font-size: 11px;
            fill: #94a3b8;
        }

        /* Copy button */
        .copy-btn {
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: rgba(99, 102, 241, 0.2);
        }
        .copy-btn.copied {
            color: #86efac;
        }
    </style>
</head>

    <script>
    // =========================================================================
    // App State
    // =========================================================================
    const appState = {
        user: null,
        profile: null,
        currentRoute: null,
        currentParams: {},
        analysesCache: null,
        analysesCacheTime: 0,
    };

    // =========================================================================
    // Utility Helpers
    // =========================================================================

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    function formatDate(dateStr) {
        if (!dateStr) return '---';
        const d = new Date(dateStr);
        return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function formatDateTime(dateStr) {
        if (!dateStr) return '---';
        const d = new Date(dateStr);
        return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ', ' +
               d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }

    function truncateUrl(url, maxLen) {
        maxLen = maxLen || 40;
        if (!url) return '';
        try {
            const u = new URL(url);
            let display = u.hostname + u.pathname;
            if (display.endsWith('/')) display = display.slice(0, -1);
            if (display.length > maxLen) display = display.substring(0, maxLen) + '...';
            return display;
        } catch (e) {
            return url.length > maxLen ? url.substring(0, maxLen) + '...' : url;
        }
    }

    function getScoreColor(score) {
        if (score >= 80) return '#22c55e';
        if (score >= 60) return '#f59e0b';
        if (score >= 40) return '#f97316';
        return '#ef4444';
    }

    function getScoreLabel(score) {
        if (score >= 80) return 'Gut';
        if (score >= 60) return 'Mittel';
        if (score >= 40) return 'Schwach';
        return 'Kritisch';
    }

    function getSeverityClass(severity) {
        const map = { critical: 'severity-critical', high: 'severity-high', medium: 'severity-medium', low: 'severity-low', info: 'severity-info' };
        return map[severity] || 'severity-info';
    }

    function getSeverityLabel(severity) {
        const map = { critical: 'Kritisch', high: 'Hoch', medium: 'Mittel', low: 'Niedrig', info: 'Info' };
        return map[severity] || severity;
    }

    function buildScoreCircleSVG(score, size, strokeWidth) {
        size = size || 80;
        strokeWidth = strokeWidth || 6;
        const radius = (size - strokeWidth) / 2;
        const circumference = 2 * Math.PI * radius;
        const offset = circumference - (score / 100) * circumference;
        const color = getScoreColor(score);
        return `<div class="score-circle" style="width:${size}px;height:${size}px;">
            <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
                <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="${strokeWidth}"/>
                <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="${color}" stroke-width="${strokeWidth}" stroke-linecap="round"
                    stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" style="transition: stroke-dashoffset 1s ease;"/>
            </svg>
            <span class="absolute text-base font-bold" style="color:${color};">${score}</span>
        </div>`;
    }

    function buildSmallScoreCircle(score) {
        return buildScoreCircleSVG(score, 48, 4);
    }

    function showLoading() {
        return `<div class="flex items-center justify-center py-20">
            <div class="text-center">
                <div class="w-10 h-10 border-3 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin-slow mx-auto mb-4" style="border-width:3px;"></div>
                <p class="text-slate-500 text-sm">Laden...</p>
            </div>
        </div>`;
    }

    function showError(message) {
        return `<div class="flex items-center justify-center py-20">
            <div class="text-center glass rounded-2xl p-8 max-w-md">
                <div class="w-12 h-12 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-4">
                    <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                </div>
                <p class="text-red-300 font-medium mb-2">Fehler</p>
                <p class="text-slate-400 text-sm">${escapeHtml(message)}</p>
            </div>
        </div>`;
    }

    function showNotification(type, title, message) {
        const container = document.getElementById('notification-container');
        if (!container) return;

        const colors = {
            success: { bg: 'rgba(16,185,129,0.15)', border: '#10b981', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>' },
            error: { bg: 'rgba(239,68,68,0.15)', border: '#ef4444', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>' },
            info: { bg: 'rgba(99,102,241,0.15)', border: '#6366f1', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' },
        };
        const c = colors[type] || colors.info;

        const el = document.createElement('div');
        el.className = 'animate-fade-in-up';
        el.innerHTML = `<div class="rounded-xl p-4 flex items-start gap-3" style="background:${c.bg};border:1px solid ${c.border};">
            <span class="flex-shrink-0 mt-0.5" style="color:${c.border};">${c.icon}</span>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-slate-200">${escapeHtml(title)}</p>
                <p class="text-xs text-slate-400 mt-0.5">${escapeHtml(message)}</p>
            </div>
            <button onclick="this.closest('.animate-fade-in-up').remove()" class="text-slate-500 hover:text-slate-300 flex-shrink-0">&times;</button>
        </div>`;
        container.appendChild(el);
        setTimeout(() => { if (el.parentNode) el.remove(); }, 6000);
    }

    // Confirmation modal
    let _confirmResolve = null;
    function showConfirmModal(title, message, actionLabel, actionClass) {
        const modal = document.getElementById('confirm-modal');
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-message').textContent = message;
        const btn = document.getElementById('confirm-action-btn');
        btn.textContent = actionLabel || 'Bestätigen';
        btn.className = `px-4 py-2 rounded-lg text-sm font-medium text-white transition-colors ${actionClass || 'bg-red-500 hover:bg-red-600'}`;
        modal.classList.remove('hidden');

        return new Promise(resolve => {
            _confirmResolve = resolve;
            btn.onclick = () => { closeConfirmModal(); resolve(true); };
        });
    }

    function closeConfirmModal() {
        document.getElementById('confirm-modal').classList.add('hidden');
        if (_confirmResolve) { _confirmResolve(false); _confirmResolve = null; }
    }

    // Copy to clipboard
    async function copyToClipboard(text, btnEl) {
        try {
            await navigator.clipboard.writeText(text);
            if (btnEl) {
                btnEl.classList.add('copied');
                const orig = btnEl.innerHTML;
                btnEl.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
                setTimeout(() => { btnEl.innerHTML = orig; btnEl.classList.remove('copied'); }, 2000);
            }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');

        const openIcon = document.getElementById('sidebar-open-icon');
        const closeIcon = document.getElementById('sidebar-close-icon');

        const isOpen = !sidebar.classList.contains('-translate-x-full');

            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
            openIcon.classList.remove('hidden');

        }

    const routes = {
        '#/dashboard': renderDashboard,
        '#/analyze': renderAnalyze,
        '#/history': renderHistory,
        '#/analysis': renderAnalysisDetail,
        '#/compare': renderCompare,
        '#/monitoring': renderMonitoring,
        '#/settings': renderSettings,
        '#/billing': renderBilling,
        '#/login': renderLogin,
        '#/signup': renderSignup,
    };

    function parseRoute() {
        const hash = window.location.hash || '#/dashboard';
        const parts = hash.split('/');
        // Handle #/analysis/:id
        if (parts.length >= 3 && parts[1] === 'analysis') {
            return { route: '#/analysis', params: { id: parts.slice(2).join('/') } };
        }
        const route = '#/' + (parts[1] || 'dashboard');
        return { route, params: {} };
    }

    async function navigate() {
        const { route, params } = parseRoute();
        const publicRoutes = ['#/login', '#/signup'];

        // Check auth
        const isAuthed = await auth.isAuthenticated();
        if (!isAuthed && !publicRoutes.includes(route)) {
            window.location.hash = '#/login';
            return;
        }
        if (isAuthed && publicRoutes.includes(route)) {
            window.location.hash = '#/dashboard';
            return;
        }

        // Load user data if authenticated
        if (isAuthed && !appState.user) {
            appState.user = await db.getUser();
            appState.profile = await db.getProfile();
            updateSidebarUser();
        }

        // Check email confirmation
        if (isAuthed && appState.user && !appState.user.email_confirmed_at && route !== '#/confirm-email') {
            const main = document.getElementById('main-content');
            main.innerHTML = `
            <div class="p-6 lg:p-8 flex items-center justify-center" style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%); min-height:100vh;">

                </div>
            </div>`;
            document.getElementById('resend-confirm-btn').addEventListener('click', async function() {
                this.disabled = true;
                this.textContent = 'Wird gesendet...';
                try {
                    var sb = getSupabase();
                    if (sb) await sb.auth.resend({ type: 'signup', email: appState.user.email });

                } catch(e) { this.textContent = 'Fehler. Bitte versuche es später.'; }
            });
            return;
        }

        appState.currentRoute = route;
        appState.currentParams = params;

        updateSidebarActive(route);

        // Close mobile sidebar
        const sidebar = document.getElementById('sidebar');
        if (window.innerWidth < 1024 && !sidebar.classList.contains('-translate-x-full')) {
            toggleSidebar();
        }

        // Show/hide sidebar for auth pages
        const sidebarEl = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        const mainContent = document.getElementById('main-content');
        if (publicRoutes.includes(route)) {
            sidebarEl.classList.add('hidden');
            toggleBtn.classList.add('hidden');
            mainContent.classList.remove('lg:ml-64');
        } else {
            sidebarEl.classList.remove('hidden');
            toggleBtn.classList.remove('hidden');
            mainContent.classList.add('lg:ml-64');
        }

        const renderFn = routes[route];
        if (renderFn) {
            renderFn(params);
        } else {
            document.getElementById('main-content').innerHTML = `

                    <div class="glass rounded-2xl p-12 text-center">

            btn.disabled = true;
            btn.innerHTML = '<span class="flex items-center justify-center gap-2"><div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin-slow"></div>Analyse läuft...</span>';

            try {
                // Use the scanner's startScan which handles the overlay animation
                if (typeof window.startScan === 'function') {
                    // We override _displayResults temporarily to capture the result
                    const origDisplay = window._displayResults;
                    let scanResult = null;

                    // Start scan - it will call _displayResults when done
                    await window.startScan(url);

                    // After scan, the result should be in _scanState
                    if (window._scanState && window._scanState.apiResult) {
                        scanResult = window._scanState.apiResult;
                        // Save the analysis
                        const saved = await db.saveAnalysis({
                            url: url,
                            overall_score: scanResult.overall_score || scanResult.score || 0,
                            category_scores: scanResult.category_scores || scanResult.categories || {},
                            issues: scanResult.issues || [],
                            metadata: scanResult.metadata || {},
                            recommendations: scanResult.recommendations || null,
                            seven_day_plan: scanResult.seven_day_plan || scanResult.action_plan || null,
                        });

                        // Display in our dashboard format
                        if (saved && saved.id) {
                            window.location.hash = '#/analysis/' + saved.id;
                        } else {
                            renderAnalysisResults(scanResult, document.getElementById('analyze-results'));
                        }
                    }
                } else {
                    // Fallback: call the API directly
                    const session = await db.getSession();
                    const response = await fetch(SUPABASE_URL + '/functions/v1/analyze', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + (session ? session.access_token : SUPABASE_ANON_KEY),
                        },
                        body: JSON.stringify({ url }),
                    });

                    if (!response.ok) throw new Error('Analyse fehlgeschlagen');
                    const result = await response.json();

                    const saved = await db.saveAnalysis({
                        url: url,
                        overall_score: result.overall_score || result.score || 0,
                        category_scores: result.category_scores || result.categories || {},
                        issues: result.issues || [],
                        metadata: result.metadata || {},
                        recommendations: result.recommendations || null,
                        seven_day_plan: result.seven_day_plan || result.action_plan || null,
                    });

                    if (saved && saved.id) {
                        window.location.hash = '#/analysis/' + saved.id;
                    } else {
                        renderAnalysisResults(result, document.getElementById('analyze-results'));
                    }
                }
            } catch (err) {
                console.error('[shift07] Analysis error:', err);
                showNotification('error', 'Analyse fehlgeschlagen', err.message || 'Bitte versuche es erneut.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span class="flex items-center justify-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>Analysieren</span>';
            }
        });

        // Auto-start if URL param present
        if (urlParam) {
            setTimeout(() => document.getElementById('analyze-form').dispatchEvent(new Event('submit')), 300);
        }
    }

    function renderSevenDayPlan(plan) {
        let days = [];
        if (Array.isArray(plan)) {
            days = plan;
        } else if (typeof plan === 'object') {
            // Might be { day1: ..., day2: ... } or { days: [...] }
            if (plan.days && Array.isArray(plan.days)) {
                days = plan.days;
            } else {
                Object.keys(plan).forEach(key => {
                    if (plan[key]) days.push({ label: key, tasks: Array.isArray(plan[key]) ? plan[key] : [plan[key]] });
                });
            }
        }

        if (days.length === 0) return '';

        return `<div class="glass rounded-2xl p-6">
            <h3 class="text-lg font-semibold text-white mb-4">7-Tage Aktionsplan</h3>
            <div class="space-y-4">
                ${days.map((day, i) => {
                    const label = day.label || day.day || ('Tag ' + (i + 1));
                    const tasks = day.tasks || day.actions || (typeof day === 'string' ? [day] : [day.description || '']);
                    return `<div class="flex gap-4">
                        <div class="flex-shrink-0 w-20">
                            <span class="text-xs font-bold px-2.5 py-1 rounded-full bg-indigo-500/15 text-indigo-400">${escapeHtml(String(label))}</span>
                        </div>
                        <div class="flex-1">
                            ${(Array.isArray(tasks) ? tasks : [tasks]).map(t => `<p class="text-sm text-slate-300 mb-1">${escapeHtml(typeof t === 'string' ? t : (t.description || t.title || JSON.stringify(t)))}</p>`).join('')}
                        </div>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
    }

    function buildRadarChart(categories, labels, size, center, radius) {
        const keys = Object.keys(categories);
        const n = keys.length;
        if (n < 3) return '';

        const angleStep = (2 * Math.PI) / n;

        // Grid circles
        let gridCircles = '';
        for (let r = 0.25; r <= 1; r += 0.25) {
            const points = [];
            for (let i = 0; i < n; i++) {
                const angle = i * angleStep - Math.PI / 2;
                points.push(`${center + radius * r * Math.cos(angle)},${center + radius * r * Math.sin(angle)}`);
            }
            gridCircles += `<polygon points="${points.join(' ')}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
        }

        // Axis lines
        let axisLines = '';
        for (let i = 0; i < n; i++) {
            const angle = i * angleStep - Math.PI / 2;
            const x = center + radius * Math.cos(angle);
            const y = center + radius * Math.sin(angle);
            axisLines += `<line x1="${center}" y1="${center}" x2="${x}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
        }

        // Data polygon
        const dataPoints = [];
        for (let i = 0; i < n; i++) {
            const val = (categories[keys[i]] || 0) / 100;
            const angle = i * angleStep - Math.PI / 2;
            dataPoints.push(`${center + radius * val * Math.cos(angle)},${center + radius * val * Math.sin(angle)}`);
        }

        // Labels
        let labelEls = '';
        for (let i = 0; i < n; i++) {
            const angle = i * angleStep - Math.PI / 2;
            const lx = center + (radius + 24) * Math.cos(angle);
            const ly = center + (radius + 24) * Math.sin(angle);
            const label = labels[keys[i]] || keys[i];
            const anchor = Math.abs(Math.cos(angle)) < 0.1 ? 'middle' : Math.cos(angle) > 0 ? 'start' : 'end';
            labelEls += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="central" class="radar-label">${escapeHtml(label)}</text>`;
        }

        return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
            ${gridCircles}
            ${axisLines}
            <polygon points="${dataPoints.join(' ')}" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="2"/>
            ${dataPoints.map((p, i) => `<circle cx="${p.split(',')[0]}" cy="${p.split(',')[1]}" r="4" fill="#6366f1"/>`).join('')}
            ${labelEls}
        </svg>`;
    }

    async function toggleIssueResolved(analysisId, issueUid, checked) {
        try {
            const analysis = await db.getAnalysis(analysisId);
            if (!analysis || !analysis.issues) return;

            // Parse uid: "category-index"
            const parts = issueUid.split('-');
            const idx = parseInt(parts[parts.length - 1], 10);
            const cat = parts.slice(0, -1).join('-');

            // Find the issue by category grouping
            let counter = 0;
            let targetIdx = -1;
            const issuesByCategory = {};
            analysis.issues.forEach((issue, i) => {
                const c = issue.category || 'other';
                if (!issuesByCategory[c]) issuesByCategory[c] = [];
                issuesByCategory[c].push({ ...issue, _originalIdx: i });
            });

            if (issuesByCategory[cat] && issuesByCategory[cat][idx]) {
                targetIdx = issuesByCategory[cat][idx]._originalIdx;
            }

            if (targetIdx >= 0) {
                analysis.issues[targetIdx].resolved = checked;
                await supabaseClient.from('analyses').update({ issues: analysis.issues }).eq('id', analysisId);
            }
        } catch (err) {
            console.error('[shift07] Toggle issue error:', err);
        }
    }

    // =========================================================================
    // Init
    // =========================================================================

    async function initApp() {
        // Wait for Supabase to be ready
        let retries = 0;
        while (!supabaseClient && retries < 20) {
            await new Promise(r => setTimeout(r, 100));
            retries++;
        }

        if (!supabaseClient) {
            document.getElementById('main-content').innerHTML = showError('Verbindung zum Server fehlgeschlagen. Bitte lade die Seite neu.');
            return;
        }

        // Listen for auth changes
        auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN') {
                appState.user = await db.getUser();
                appState.profile = await db.getProfile();

                // Auto-verify subscription on sign-in if checkout=success in URL
                var urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('checkout') === 'success' && session) {
                    console.log('[shift07] Checkout success detected, verifying subscription...');
                    try {
                        var resp = await fetch(SUPABASE_URL + '/functions/v1/verify-subscription', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + session.access_token,
                                'apikey': SUPABASE_ANON_KEY,
                            },
                        });
                        var result = await resp.json();
                        console.log('[shift07] Verify result:', JSON.stringify(result));
                        if (result.success && result.data.subscription_status === 'pro') {
                            appState.profile = await db.getProfile();
                            updateSidebarUser();
                            if (typeof payments !== 'undefined') {
                                payments._showNotification('success', 'Shift07 Pro ist aktiv!', 'Du hast vollen Zugriff auf alle Funktionen.');
                            }
                            // Clean URL and navigate to dashboard
                            window.history.replaceState({}, '', window.location.pathname);
                            window.location.hash = '#/dashboard';
                        }
                    } catch (e) {
                        console.error('[shift07] Auto-verify error:', e);
                    }
                }
                updateSidebarUser();
                if (appState.currentRoute === '#/login' || appState.currentRoute === '#/signup') {
                    window.location.hash = '#/dashboard';
                }
            } else if (event === 'SIGNED_OUT') {
                appState.user = null;
                appState.profile = null;
                window.location.hash = '#/login';
            }
        });

        // Handle checkout return - poll until subscription is verified
        var checkoutParam = new URLSearchParams(window.location.search).get('checkout');
        if (checkoutParam === 'success') {
            console.log('[shift07] Checkout success detected in URL');
            // Show persistent notification
            var banner = document.createElement('div');
            banner.id = 'checkout-banner';
            banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(90deg,#4f46e5,#7c3aed);padding:12px 20px;text-align:center;color:white;font-weight:600;font-size:14px;';
            banner.textContent = 'Abo wird aktiviert...';
            document.body.appendChild(banner);

            // Poll verify-subscription every 3 seconds
            var pollCount = 0;
            var pollInterval = setInterval(async function() {
                pollCount++;
                console.log('[shift07] Polling verify-subscription attempt', pollCount);
                try {
                    var session = await db.getSession();
                    if (!session) {
                        console.log('[shift07] No session yet');
                        if (pollCount > 20) { clearInterval(pollInterval); banner.textContent = 'Bitte lade die Seite neu.'; }
                        return;
                    }
                    var resp = await fetch(SUPABASE_URL + '/functions/v1/verify-subscription', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + session.access_token,
                            'apikey': SUPABASE_ANON_KEY,
                        },
                    });
                    var result = await resp.json();
                    console.log('[shift07] Poll result:', JSON.stringify(result));
                    if (result.success && result.data.subscription_status === 'pro') {
                        clearInterval(pollInterval);
                        banner.textContent = 'Shift07 Pro ist aktiv!';
                        banner.style.background = 'linear-gradient(90deg,#059669,#10b981)';
                        // Clean URL and reload
                        window.history.replaceState({}, '', window.location.pathname);
                        setTimeout(function() {
                            window.location.href = window.location.pathname + '#/dashboard';
                            window.location.reload();
                        }, 1500);
                    } else if (pollCount > 20) {
                        clearInterval(pollInterval);
                        banner.textContent = 'Bitte lade die Seite neu um den Pro-Status zu aktivieren.';
                    }
                } catch (e) {
                    console.error('[shift07] Poll error:', e);
                }
            }, 3000);
        }

        // Initial navigation
        if (!window.location.hash || window.location.hash === '#' || window.location.hash === '#/') {
            window.location.hash = '#/dashboard';
        }

        navigate();
    }

    // Start the app when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => setTimeout(initApp, 150));
    } else {
        setTimeout(initApp, 150);
    }
    </script>
</body>
</html>
